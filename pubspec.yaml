name: personal_health_diary
description: A new Flutter project for personal health tracking and diary management.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0
  firebase_storage: ^12.1.0
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.5.2
  
  # Navigation
  go_router: ^14.0.0
  
  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  
  # Google Sign-In
  google_sign_in: ^6.2.1
  
  # Google Calendar API
  googleapis: ^12.0.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  permission_handler: ^11.3.1
  
  # Networking & AI Integration
  http: ^1.1.0
  connectivity_plus: ^6.1.3

  # Charts
  fl_chart: ^0.69.0

  # Media and device
  image_picker: ^1.1.2
  camera: ^0.11.0+2
  geolocator: ^13.0.2
  url_launcher: ^6.3.1
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.1
  speech_to_text: ^7.0.0
  sensors_plus: ^6.1.1
  pedometer: ^4.1.1
  light: ^5.0.0
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.0.0
  flutter_timezone: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  
  # Code Generation
  build_runner: ^2.4.9
  riverpod_generator: ^2.5.2
  custom_lint: ^0.7.6
  riverpod_lint: ^2.5.2

flutter:
  uses-material-design: true
  assets:
    - assets/branding/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/app_icon.png
  adaptive_icon_foreground: assets/branding/app_icon.png
  adaptive_icon_background: "#F4FAFF"
  min_sdk_android: 21
